# Host-nginx overlay. Use this *instead of* deploy/docker-compose.prod.yml when
# TLS is terminated by host-installed nginx (see DKayode/k4yod3 repo).
#
# Usage on the VPS:
#   docker compose -f docker-compose.yml \
#                  -f deploy/docker-compose.host-nginx.yml \
#                  pull
#   docker compose -f docker-compose.yml \
#                  -f deploy/docker-compose.host-nginx.yml \
#                  up -d
#
# The host nginx site config (k4yod3/nginx/sites-available/nook.k4yod3.com.conf)
# proxies to 127.0.0.1:3001, so we bind web's container port 3000 to loopback:3001.
# Everything else (db, mail, api) stays internal to the compose network.

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/dkayode/nook/web:latest}
    build: !reset null
    pull_policy: always
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:3001:3000"

  api:
    image: ${API_IMAGE:-ghcr.io/dkayode/nook/api:latest}
    build: !reset null
    pull_policy: always
    ports: !reset []
    restart: unless-stopped

  db:
    ports: !reset []

  mail:
    ports: !reset []
