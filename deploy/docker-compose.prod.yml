# Production overlay. TLS is terminated by host-installed nginx (see DKayode/k4yod3 repo).
# Usage on the VPS:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# The host nginx site config proxies to 127.0.0.1:3001, so we bind web's container
# port 3000 to loopback:3001. Everything else (mail, api) stays internal to the
# compose network. Postgres lives on Neon — set DATABASE_URL accordingly in .env.

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/dkayode/nook/web:latest}
    build: !reset null
    pull_policy: always
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:3001:3000"

  api:
    image: ${API_IMAGE:-ghcr.io/dkayode/nook/api:latest}
    build: !reset null
    pull_policy: always
    ports: !reset []
    restart: unless-stopped

  mail:
    ports: !reset []
