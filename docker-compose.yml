services:
  mail:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  api:
    # In dev: `docker compose build api` builds from ./api and tags as the image below.
    # In prod (VPS): `docker compose pull api` fetches the GHCR image built by CI.
    image: ${API_IMAGE:-ghcr.io/dkayode/nook/api:latest}
    build: ./api
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN}
    ports:
      - "8000:8000"

  web:
    image: ${WEB_IMAGE:-ghcr.io/dkayode/nook/web:latest}
    build: ./web
    restart: unless-stopped
    environment:
      # Postgres lives on Neon — DATABASE_URL is the full connection string with sslmode=require.
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN}
      EMAIL_SERVER: ${EMAIL_SERVER}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_started
