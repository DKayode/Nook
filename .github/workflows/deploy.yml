name: Build & Deploy Nook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/dkayode/nook

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: web
            context: ./web
          - service: api
            context: ./api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (compose files only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify deploy secrets are set
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          missing=()
          [ -z "${SSH_HOST}" ]    && missing+=("SSH_HOST")
          [ -z "${SSH_USER}" ]    && missing+=("SSH_USER")
          [ -z "${SSH_KEY}" ]     && missing+=("SSH_KEY")
          [ -z "${DEPLOY_PATH}" ] && missing+=("DEPLOY_PATH")
          [ -z "${DOMAIN}" ]      && missing+=("DOMAIN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "Add them at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Trust VPS host key
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # No git on the VPS — we only ship the compose files. Images are pulled from GHCR.
      # Which overlay to use is configurable: set repo variable COMPOSE_OVERLAY (e.g. to
      # `docker-compose.host-nginx.yml` for host-nginx TLS), defaults to the Caddy overlay.
      - name: Upload compose files to VPS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH/deploy'"
          scp docker-compose.yml "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/docker-compose.yml"
          scp -r deploy/.        "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/deploy/"

      - name: Pull images & restart on VPS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SHA: ${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERLAY: ${{ vars.COMPOSE_OVERLAY || 'docker-compose.prod.yml' }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash -se <<EOF
            set -euo pipefail
            cd '$DEPLOY_PATH'

            if [ ! -f .env ]; then
              echo "ERROR: .env missing at \$PWD" >&2
              exit 1
            fi
            if [ ! -f 'deploy/$OVERLAY' ]; then
              echo "ERROR: deploy/$OVERLAY not on VPS — was it committed and uploaded?" >&2
              exit 1
            fi

            echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin

            export WEB_IMAGE='ghcr.io/dkayode/nook/web:$SHA'
            export API_IMAGE='ghcr.io/dkayode/nook/api:$SHA'

            COMPOSE="docker compose -f docker-compose.yml -f deploy/$OVERLAY"
            \$COMPOSE pull web api
            \$COMPOSE up -d --remove-orphans
            \$COMPOSE exec -T web npx prisma db push --skip-generate
            docker image prune -f
          EOF

      - name: Health check
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ secrets.DOMAIN }}/sign-in" || echo 000)
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 6
          done
          echo "Site did not return 200 after 2 minutes" >&2
          exit 1
